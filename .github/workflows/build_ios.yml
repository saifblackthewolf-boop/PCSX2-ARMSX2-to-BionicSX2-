name: Build iOS ARMSX2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Install CMake
      run: |
        brew install cmake ninja

    - name: Create React Native iOS project
      run: |
        cd ARMSX2
        npx react-native init BionicSX2 --template react-native-template-typescript
        cp -r BionicSX2/ios ios/
        rm -rf BionicSX2

    - name: Copy bridge files
      run: |
        cp ios/ARMSX2/Armsx2Bridge.h ios/BionicSX2/
        cp ios/ARMSX2/Armsx2Bridge.m ios/BionicSX2/
        cp ios/ARMSX2/Bridging-Header.h ios/BionicSX2/

    - name: Update React Native project
      run: |
        cd ARMSX2/ios/BionicSX2
        # Add bridge files to Xcode project
        echo "Adding bridge files to Xcode project..."
        # This would require more complex scripting to modify the .pbxproj file
        # For now, we'll assume manual addition or use a script

    - name: Build PCSX2 static library
      run: |
        cd ARMSX2/ios
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -G Ninja
        ninja emucore

    - name: Copy static library to Xcode project
      run: |
        cp ARMSX2/ios/build/lib/libemucore.a ARMSX2/ios/BionicSX2/

    - name: Update Xcode project settings
      run: |
        cd ARMSX2/ios/BionicSX2
        # Add library search paths, header search paths, etc.
        # This would require modifying the .pbxproj file
        # For demonstration, we'll create a simple script

    - name: Build iOS app
      run: |
        cd ARMSX2/ios/BionicSX2
        xcodebuild clean build \
          -workspace BionicSX2.xcworkspace \
          -scheme BionicSX2 \
          -configuration Release \
          -sdk iphoneos \
          -destination generic/platform=iOS \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          DEVELOPMENT_TEAM=""

    - name: Create unsigned IPA
      run: |
        cd ARMSX2/ios/BionicSX2
        mkdir -p Payload
        cp -r build/Release-iphoneos/BionicSX2.app Payload/
        zip -r BionicSX2.ipa Payload/
        rm -rf Payload/

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: BionicSX2-iOS-IPA
        path: ARMSX2/ios/BionicSX2/BionicSX2.ipa